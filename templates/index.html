<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome | Student Predictor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .card {
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            background: white;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            max-width: 500px;
        }

        h1 {
            font-weight: 700;
            margin-bottom: 20px;
        }

        p {
            color: #555;
            margin-bottom: 30px;
        }

        .btn-custom {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 10px;
            background: #667eea;
            color: white;
            border: none;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🎓 Welcome</h1>
    <p>Predict student maths performance using machine learning.</p>

    <a href="/predictdata">
        <button class="btn-custom">🚀 Go to Prediction Page</button>
    </a>
</div>

</body>
</html>
